name: iOS Build & TestFlight

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-14
    timeout-minutes: 45
    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Verify web assets
        run: |
          [ -f dist/index.html ] && echo "✓ dist/index.html" || (echo "✗ dist/index.html manquant" && exit 1)
          JS_COUNT=$(find dist/assets -name "*.js" 2>/dev/null | wc -l)
          [ "$JS_COUNT" -gt 0 ] && echo "✓ $JS_COUNT fichier(s) JS" || (echo "✗ JS manquant" && exit 1)

      - name: Add iOS platform
        run: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi

      - name: Sync Capacitor iOS
        run: npx cap sync ios

      - name: Select Xcode & detect simulator
        run: |
          XCODE=$(ls /Applications | grep "^Xcode" | sort -V | tail -1)
          sudo xcode-select -s "/Applications/$XCODE/Contents/Developer"
          xcodebuild -version

          # Sélectionne un iPhone disponible et mémorise l'ID
          SIM_ID=$(xcrun simctl list devices available -j \
            | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          iphones = []
          for runtime, devices in data['devices'].items():
              if 'iOS' in runtime:
                  for d in devices:
                      if 'iPhone' in d['name'] and d['isAvailable']:
                          iphones.append(d['udid'])
          print(iphones[-1] if iphones else '')
          ")
          if [ -z "$SIM_ID" ]; then
            echo "Aucun simulateur iPhone disponible" && exit 1
          fi
          echo "Simulateur sélectionné : $SIM_ID"
          echo "SIM_ID=$SIM_ID" >> "$GITHUB_ENV"

      - name: Set Info.plist
        run: |
          PLIST="ios/App/App/Info.plist"
          BUILD_NUMBER=$(date +%Y%m%d%H%M)

          /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier com.affichagescolaire.app" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName 'Affichage Scolaire'" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString 1.0" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" "$PLIST"

          /usr/libexec/PlistBuddy -c "Delete :WKCustomSchemes" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :WKCustomSchemes array" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :WKCustomSchemes:0 string affichagescolaire" "$PLIST"

      - name: Build for simulator
        run: |
          set -o pipefail
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -destination "id=$SIM_ID" \
            -derivedDataPath build/sim \
            CODE_SIGNING_ALLOWED=NO \
            build 2>&1 | xcpretty || xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -destination "id=$SIM_ID" \
            -derivedDataPath build/sim \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Verify app bundle
        run: |
          APP=$(find build/sim -name "App.app" -not -path "*/SourcePackages/*" | head -1)
          echo "Bundle : $APP"
          [ -n "$APP" ] || (echo "App.app introuvable" && exit 1)
          [ -d "$APP/public" ] && echo "✓ public/" || echo "✗ public/ manquant"
          [ -f "$APP/public/index.html" ] && echo "✓ index.html" || echo "✗ index.html manquant"
          [ -f "$APP/capacitor.config.json" ] && echo "✓ capacitor.config.json" || echo "✗ capacitor.config.json manquant"
          /usr/libexec/PlistBuddy -c "Print :WKCustomSchemes" "$APP/Info.plist" && echo "✓ WKCustomSchemes" || echo "✗ WKCustomSchemes manquant"
          echo "APP_PATH=$APP" >> "$GITHUB_ENV"

      - name: Boot simulator & capture screenshot
        run: |
          xcrun simctl boot "$SIM_ID" 2>/dev/null || true
          # Attendre que le simulateur soit prêt
          for i in $(seq 1 12); do
            STATE=$(xcrun simctl list devices | grep "$SIM_ID" | grep -o "Booted" || true)
            [ "$STATE" = "Booted" ] && break
            sleep 5
          done
          xcrun simctl install "$SIM_ID" "$APP_PATH"
          xcrun simctl launch "$SIM_ID" com.affichagescolaire.app
          sleep 20
          xcrun simctl io "$SIM_ID" screenshot screenshot.png && echo "✓ Screenshot capturé"

      - name: Capture logs
        if: always()
        run: |
          xcrun simctl spawn "$SIM_ID" log stream \
            --predicate 'process == "App" OR subsystem == "com.apple.webkit"' \
            --timeout 5 2>/dev/null | tee simulator.log || true
          grep -i "error\|failed\|capacitor\|webkit" simulator.log | head -30 || echo "Aucune erreur"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-${{ github.run_number }}
          path: |
            app/screenshot.png
            app/simulator.log
          retention-days: 7
