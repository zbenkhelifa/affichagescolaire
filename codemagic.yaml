workflows:
  ios_appstore:
    name: iOS App Store
    max_build_duration: 60
    environment:
      groups:
        - appstore
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.affichagescolaire.app
      vars:
        BUNDLE_ID: com.affichagescolaire.app
        APP_NAME: "Affichage Scolaire"
        APP_SCHEME: affichagescolaire
        APP_VERSION: "1.0"
        XCODE_PROJECT: app/ios/App/App.xcodeproj
        XCODE_SCHEME: App
      xcode: latest
      node: 22
    scripts:
      - name: Install provisioning profile
        script: |
          echo $CM_PROVISIONING_PROFILE | base64 --decode > /tmp/profile.mobileprovision
          PROFILE_DATA=$(security cms -D -i /tmp/profile.mobileprovision)
          UUID=$(echo "$PROFILE_DATA" | python3 -c "import sys,plistlib; d=plistlib.loads(sys.stdin.buffer.read()); print(d['UUID'])")
          TEAM_ID=$(echo "$PROFILE_DATA" | python3 -c "import sys,plistlib; d=plistlib.loads(sys.stdin.buffer.read()); print(d['TeamIdentifier'][0])")
          PROFILE_NAME=$(echo "$PROFILE_DATA" | python3 -c "import sys,plistlib; d=plistlib.loads(sys.stdin.buffer.read()); print(d['Name'])")
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp /tmp/profile.mobileprovision "$HOME/Library/MobileDevice/Provisioning Profiles/$UUID.mobileprovision"
          echo "$UUID" > /tmp/PROFILE_UUID
          echo "$TEAM_ID" > /tmp/TEAM_ID
          echo "$PROFILE_NAME" > /tmp/PROFILE_NAME
          echo "✓ Profil installé (Team: $TEAM_ID, Profile: $PROFILE_NAME)"

      - name: Install dependencies
        working_directory: app
        script: npm install

      - name: Build web assets
        working_directory: app
        script: npm run build

      - name: Add iOS platform
        working_directory: app
        script: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi
          [ -d "ios/App" ] || (echo "Échec cap add ios" && exit 1)

      - name: Generate app icons
        working_directory: app
        script: |
          SRC="resources/icon.png"
          ICONSET="ios/App/App/Assets.xcassets/AppIcon.appiconset"
          magick "$SRC" -resize 40x40    "$ICONSET/AppIcon-20@2x.png"    2>/dev/null || convert "$SRC" -resize 40x40    "$ICONSET/AppIcon-20@2x.png"
          magick "$SRC" -resize 60x60    "$ICONSET/AppIcon-20@3x.png"    2>/dev/null || convert "$SRC" -resize 60x60    "$ICONSET/AppIcon-20@3x.png"
          magick "$SRC" -resize 58x58    "$ICONSET/AppIcon-29@2x.png"    2>/dev/null || convert "$SRC" -resize 58x58    "$ICONSET/AppIcon-29@2x.png"
          magick "$SRC" -resize 87x87    "$ICONSET/AppIcon-29@3x.png"    2>/dev/null || convert "$SRC" -resize 87x87    "$ICONSET/AppIcon-29@3x.png"
          magick "$SRC" -resize 80x80    "$ICONSET/AppIcon-40@2x.png"    2>/dev/null || convert "$SRC" -resize 80x80    "$ICONSET/AppIcon-40@2x.png"
          magick "$SRC" -resize 120x120  "$ICONSET/AppIcon-40@3x.png"    2>/dev/null || convert "$SRC" -resize 120x120  "$ICONSET/AppIcon-40@3x.png"
          magick "$SRC" -resize 120x120  "$ICONSET/AppIcon-60@2x.png"    2>/dev/null || convert "$SRC" -resize 120x120  "$ICONSET/AppIcon-60@2x.png"
          magick "$SRC" -resize 180x180  "$ICONSET/AppIcon-60@3x.png"    2>/dev/null || convert "$SRC" -resize 180x180  "$ICONSET/AppIcon-60@3x.png"
          magick "$SRC" -resize 152x152  "$ICONSET/AppIcon-76@2x.png"    2>/dev/null || convert "$SRC" -resize 152x152  "$ICONSET/AppIcon-76@2x.png"
          magick "$SRC" -resize 167x167  "$ICONSET/AppIcon-83.5@2x.png"  2>/dev/null || convert "$SRC" -resize 167x167  "$ICONSET/AppIcon-83.5@2x.png"
          magick "$SRC" -resize 1024x1024 "$ICONSET/AppIcon-1024@1x.png" 2>/dev/null || convert "$SRC" -resize 1024x1024 "$ICONSET/AppIcon-1024@1x.png"
          echo "✓ Icônes générées"

      - name: Patch AppDelegate (Capacitor 8 SPM bug)
        working_directory: app
        script: |
          DELEGATE="ios/App/App/AppDelegate.swift"
          sed -i '' \
            's/return ApplicationDelegateProxy.shared.application(application, continue: userActivity, restorationHandler: restorationHandler)/return false/' \
            "$DELEGATE"
          echo "AppDelegate.swift patché"

      - name: Sync Capacitor iOS
        working_directory: app
        script: npx cap sync ios

      - name: Generate iPad Pro icon
        working_directory: app
        script: |
          ICON_SRC="public/logo_512.png"
          DEST="ios/App/App/Assets.xcassets/AppIcon.appiconset/AppIcon-167@2x~ipad.png"
          if [ -f "$ICON_SRC" ]; then
            magick "$ICON_SRC" -resize 167x167 "$DEST" 2>/dev/null || \
            convert "$ICON_SRC" -resize 167x167 "$DEST" || true
          fi

      - name: Set Info.plist values
        working_directory: app
        script: |
          PLIST="ios/App/App/Info.plist"
          BUILD_NUMBER=$(date +%Y%m%d%H%M)

          /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier $BUNDLE_ID" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName $APP_NAME" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $APP_VERSION" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" "$PLIST"

          # Add custom scheme for WKWebView (required iOS 16.4+)
          /usr/libexec/PlistBuddy -c "Delete :WKCustomSchemes" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :WKCustomSchemes array" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :WKCustomSchemes:0 string $APP_SCHEME" "$PLIST"

          # Device orientations
          /usr/libexec/PlistBuddy -c "Delete :UISupportedInterfaceOrientations" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :UISupportedInterfaceOrientations array" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :UISupportedInterfaceOrientations:0 string UIInterfaceOrientationPortrait" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :UISupportedInterfaceOrientations:1 string UIInterfaceOrientationLandscapeLeft" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :UISupportedInterfaceOrientations:2 string UIInterfaceOrientationLandscapeRight" "$PLIST"

      - name: Patch xcodeproj signing
        working_directory: app
        script: |
          UUID=$(cat /tmp/PROFILE_UUID)
          TEAM_ID=$(cat /tmp/TEAM_ID)
          PROFILE_NAME=$(cat /tmp/PROFILE_NAME)
          PBXPROJ="ios/App/App.xcodeproj/project.pbxproj"
          # Passer en signing manuel avec le bon profil
          sed -i '' "s/DEVELOPMENT_TEAM = \"\";/DEVELOPMENT_TEAM = $TEAM_ID;/g" "$PBXPROJ"
          sed -i '' "s/DEVELOPMENT_TEAM = [A-Z0-9]*;/DEVELOPMENT_TEAM = $TEAM_ID;/g" "$PBXPROJ"
          sed -i '' "s/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g" "$PBXPROJ"
          sed -i '' "s/PROVISIONING_PROFILE_SPECIFIER = \"\";/PROVISIONING_PROFILE_SPECIFIER = \"$PROFILE_NAME\";/g" "$PBXPROJ"
          echo "✓ xcodeproj patché (Team: $TEAM_ID, Profile: $PROFILE_NAME)"

      - name: Build IPA
        working_directory: app
        script: |
          if [ -d "ios/App/App.xcworkspace" ]; then
            xcode-project build-ipa \
              --workspace ios/App/App.xcworkspace \
              --scheme "$XCODE_SCHEME"
          else
            xcode-project build-ipa \
              --project ios/App/App.xcodeproj \
              --scheme "$XCODE_SCHEME"
          fi

      - name: Verify IPA contents
        working_directory: app
        script: |
          IPA=$(find /tmp/xcodebuild_logs -name "*.ipa" 2>/dev/null | head -1)
          if [ -z "$IPA" ]; then
            IPA=$(find . -name "*.ipa" 2>/dev/null | head -1)
          fi
          if [ -n "$IPA" ]; then
            TMPDIR=$(mktemp -d)
            unzip -q "$IPA" -d "$TMPDIR"
            APP_PATH=$(find "$TMPDIR" -name "*.app" | head -1)
            echo "=== Vérification du bundle ==="
            ls "$APP_PATH/public/" 2>/dev/null && echo "✓ Assets web présents" || echo "✗ Assets web manquants"
            [ -f "$APP_PATH/public/index.html" ] && echo "✓ index.html présent" || echo "✗ index.html manquant"
            ls "$APP_PATH/public/"*.js 2>/dev/null | head -3 && echo "✓ JS présent" || echo "✗ JS manquant"
            [ -f "$APP_PATH/capacitor.config.json" ] && echo "✓ capacitor.config.json présent" || echo "✗ capacitor.config.json manquant"
            rm -rf "$TMPDIR"
          fi


    artifacts:
      - app/ios/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - app/ios/App/*.xcarchive

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false
